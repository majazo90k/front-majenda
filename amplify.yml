version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
    build:
      commands:
        - npm run build
        - cp dist/front-majenda/browser/index.csr.html dist/front-majenda/browser/index.html
  artifacts:
    baseDirectory: dist/front-majenda/browser
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
